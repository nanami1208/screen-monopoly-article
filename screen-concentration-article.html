<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스크린 독과점 시각화</title>
  <link rel="stylesheet" href="./screen-concentration-article.css">
</head>
<body>
  <main class="chart-page">
    <nav class="chart-tabs" aria-label="시각화 목차">
      <button class="chart-tab active" type="button" data-target="year-panel" aria-controls="year-panel" aria-selected="true">연도별 점유일</button>
      <button class="chart-tab" type="button" data-target="movie-panel" aria-controls="movie-panel" aria-selected="false">장기 점유 영화</button>
      <button class="chart-tab" type="button" data-target="march-panel" aria-controls="march-panel" aria-selected="false">2026년 3월 집중도</button>
    </nav>

    <section id="year-panel" class="chart-block active" data-panel="chart">
      <h2>연도별 단일 영화 30% 이상 스크린 점유일</h2>
      <svg id="year-chart" class="chart" viewBox="0 0 760 420" role="img" aria-label="연도별 단일 영화 30% 이상 스크린 점유일"></svg>
    </section>

    <section id="movie-panel" class="chart-block" data-panel="chart" hidden>
      <h2>30% 이상 스크린 점유가 오래 지속된 영화</h2>
      <svg id="movie-chart" class="chart" viewBox="0 0 760 360" role="img" aria-label="30% 이상 스크린 점유 지속일 상위 영화"></svg>
    </section>

    <section id="march-panel" class="chart-block" data-panel="chart" hidden>
      <h2>2026년 3월 시장 집중도</h2>
      <svg id="march-chart" class="chart" viewBox="0 0 760 360" role="img" aria-label="2026년 3월 시장 집중도"></svg>
    </section>
  </main>

  <div id="tooltip" class="tooltip" role="status" aria-hidden="true"></div>
  <script src="./screen-concentration-article.js"></script>
</body>
</html>
